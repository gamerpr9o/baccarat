<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baccarat AI | Oracle Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100;300;400;600;700&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030305;
            --accent: #6d28d9; /* Deep Purple */
            --player: #0ea5e9; /* Electric Blue */
            --banker: #f43f5e; /* Rose Red */
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #64748b;
            --transition-fluid: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* --- IMMERSIVE BACKGROUND --- */
        #video-wrap {
            position: fixed; inset: 0; z-index: -2;
            overflow: hidden; transition: filter 1s ease;
        }
        #bg-video {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.35; filter: contrast(1.1) brightness(0.7);
        }
        .vignette {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, transparent 20%, rgba(3, 3, 5, 0.9) 100%);
        }

        /* --- AUTHENTICATION (MINIMALIST) --- */
        .auth-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: #030305; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .auth-box {
            width: 100%; max-width: 400px; padding: 40px; text-align: center;
            animation: fadeIn 1s ease;
        }
        .auth-box h1 { font-weight: 100; letter-spacing: 12px; margin-bottom: 40px; color: var(--text-main); }
        .auth-input {
            width: 100%; background: none; border: none; border-bottom: 1px solid var(--glass-border);
            padding: 15px; color: white; font-size: 1.2rem; text-align: center; outline: none;
            margin-bottom: 30px; transition: var(--transition-fluid); letter-spacing: 4px;
        }
        .auth-input:focus { border-color: var(--player); letter-spacing: 8px; }

        /* --- APP STRUCTURE --- */
        .app-shell {
            height: 100vh; display: grid; grid-template-rows: auto 1fr;
            padding: 30px; gap: 30px; opacity: 0; transform: scale(1.05);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        .app-shell.active { opacity: 1; transform: scale(1); }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px;
        }
        .logo { font-weight: 700; font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; }
        .logo span { font-weight: 200; opacity: 0.5; }

        .sys-status { display: flex; gap: 30px; align-items: center; }
        .status-item { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-dim); }
        .status-item span { color: var(--player); margin-left: 8px; }

        /* --- MAIN DASHBOARD --- */
        .dashboard {
            display: grid; grid-template-columns: 320px 1fr 320px; gap: 30px;
        }

        .panel {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 32px; padding: 30px; backdrop-filter: blur(20px);
            display: flex; flex-direction: column; opacity: 0; transform: translateY(20px);
        }
        .panel.show { opacity: 1; transform: translateY(0); transition: all 0.8s ease; }

        .panel-title {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 3px; color: var(--text-dim); margin-bottom: 30px;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* --- CARD GRID --- */
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .card-node {
            aspect-ratio: 1/1; background: rgba(255,255,255,0.03);
            border: 1px solid transparent; border-radius: 16px;
            color: white; font-size: 1.2rem; font-weight: 600; cursor: pointer;
            transition: var(--transition-fluid); display: flex; align-items: center; justify-content: center;
        }
        .card-node:hover {
            background: rgba(255,255,255,0.1); border-color: var(--player);
            transform: scale(1.1) rotate(5deg);
        }

        /* --- THE ORACLE CORE (CENTER PIECE) --- */
        .oracle-center {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .oracle-orb {
            width: 280px; height: 280px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 70%);
            box-shadow: inset 0 0 50px rgba(255,255,255,0.05), 0 0 40px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: var(--transition-fluid);
        }
        .oracle-orb::before {
            content: ''; position: absolute; inset: -15px;
            border: 1px solid var(--glass-border); border-radius: 50%;
            animation: rotate 10s linear infinite;
        }
        .orb-glow {
            position: absolute; width: 60%; height: 60%;
            border-radius: 50%; filter: blur(40px);
            background: var(--player); opacity: 0.3;
            transition: all 1s ease;
        }

        #prediction-text {
            font-size: 3.5rem; font-weight: 700; letter-spacing: 10px;
            text-transform: uppercase; z-index: 10;
            transition: var(--transition-fluid);
        }

        /* --- PATTERN ENGINE --- */
        .pattern-list { display: grid; gap: 15px; }
        .pattern-card {
            padding: 20px; border-radius: 20px; background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border); cursor: pointer; transition: var(--transition-fluid);
        }
        .pattern-card.active { border-color: var(--player); background: rgba(14, 165, 233, 0.05); }
        .pattern-card h4 { font-size: 0.9rem; margin-bottom: 5px; }
        .pattern-card p { font-size: 0.7rem; color: var(--text-dim); }

        .logger { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: auto; }
        .log-btn {
            height: 60px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 700; font-size: 0.8rem; transition: var(--transition-fluid);
        }
        .log-btn.p { background: var(--player); color: white; }
        .log-btn.b { background: var(--banker); color: white; }
        .log-btn.t { background: #facc15; color: black; }
        .log-btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

        /* --- ANIMATIONS --- */
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(1); opacity: 0.3; } }

        /* --- UI UTILS --- */
        .btn-ghost {
            background: none; border: 1px solid var(--glass-border);
            color: var(--text-dim); padding: 8px 16px; border-radius: 100px;
            cursor: pointer; transition: var(--transition-fluid); font-size: 0.7rem;
        }
        .btn-ghost:hover { border-color: white; color: white; }
        
        #chart-mini { height: 120px; width: 100%; margin-top: auto; }

    </style>
</head>
<body>

    <div id="video-wrap">
        <video id="bg-video" loop playsinline autoplay muted>
            <source src="kenin.mp4" type="video/mp4">
        </video>
    </div>
    <div class="vignette"></div>

    <!-- AUTHENTICATION -->
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-box">
            <h1>ORACLE</h1>
            <input type="password" id="key-input" class="auth-input" placeholder="KEY_CODE">
            <button id="login-btn" class="btn-ghost" style="width: 100%; padding: 15px; border-radius: 12px;">AUTHORIZE ACCESS</button>
            <p id="err" style="color: var(--banker); margin-top: 20px; font-size: 0.8rem; display: none;">INVALID_KEY</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-shell" class="app-shell">
        <header>
            <div class="logo">BAC AI <span>AI</span></div>
            <div class="sys-status">
                <div class="status-item">UPLINK: <span id="timer">00:00:00</span></div>
                <div class="status-item">ENGINE: <span>STABLE</span></div>
                <button id="mute-btn" class="btn-ghost"><i class="fas fa-volume-up"></i></button>
                <button id="exit-btn" class="btn-ghost" style="border-color: var(--banker);">EXIT</button>
            </div>
        </header>

        <main class="dashboard">
            <!-- INPUTS -->
            <section class="panel" id="panel-1">
                <div class="panel-title">Data Ingestion <i class="fas fa-fingerprint"></i></div>
                <div class="card-grid" id="card-grid">
                    <!-- JS Generated -->
                </div>
                <button id="reset-btn" class="btn-ghost" style="margin-top: 30px;">PURGE SESSION DATA</button>
                <div style="margin-top: auto;">
                    <div class="status-item" style="margin-bottom: 10px;">SIGNAL_HISTORY</div>
                    <div id="log-list" style="height: 100px; overflow-y: auto; font-family: 'JetBrains Mono'; font-size: 0.6rem; color: var(--text-dim);">
                        <!-- Mini Logs -->
                    </div>
                </div>
            </section>

            <!-- THE CORE -->
            <section class="oracle-center">
                <div class="oracle-orb">
                    <div id="glow" class="orb-glow"></div>
                    <div id="prediction-text">WAIT</div>
                </div>
                <div style="margin-top: 50px; text-align: center;">
                    <div style="font-size: 0.7rem; letter-spacing: 5px; color: var(--text-dim); margin-bottom: 10px;">SIGNAL CONFIDENCE</div>
                    <div id="confidence-bar" style="width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
                        <div id="conf-fill" style="width: 0%; height: 100%; background: var(--player); transition: width 1s ease;"></div>
                    </div>
                    <div id="conf-val" style="font-family: 'JetBrains Mono'; font-size: 0.8rem; margin-top: 10px; color: var(--player);">0%</div>
                </div>
            </section>

            <!-- PATTERNS -->
            <section class="panel" id="panel-2">
                <div class="panel-title">Neural Patterns <i class="fas fa-project-diagram"></i></div>
                <div class="pattern-list">
                    <div class="pattern-card active" data-algo="trend">
                        <h4>TREND_LOGIC</h4>
                        <p>Aggressive momentum tracking.</p>
                    </div>
                    <div class="pattern-card" data-algo="reversal">
                        <h4>REVERSAL_SCAN</h4>
                        <p>Counter-streak identification.</p>
                    </div>
                </div>
                
                <div style="margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                    <div class="panel-title">Manual Result Log</div>
                    <div class="logger">
                        <button class="log-btn p" data-res="P">P</button>
                        <button class="log-btn t" data-res="T">T</button>
                        <button class="log-btn b" data-res="B">B</button>
                    </div>
                </div>

                <div id="chart-mini">
                    <canvas id="volatility-chart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const KEY = 'BACC-AS9P-19-KK';
        const VALS = {'A':-1,'2':-1,'3':-1,'4':-5,'5':-5,'6':5,'7':5,'8':1,'9':1,'10':0,'J':0,'Q':0,'K':0};

        let engine = {
            count: 0,
            history: [0],
            patterns: [],
            mode: 'trend'
        };

        let chart;

        const init = () => {
            const grid = document.getElementById('card-grid');
            Object.keys(VALS).forEach(card => {
                const node = document.createElement('div');
                node.className = 'card-node';
                node.innerText = card;
                node.onclick = () => ingestData(card);
                grid.appendChild(node);
            });

            setupChart();
            checkSession();
            animatePanels();
        };

        const ingestData = (card) => {
            const delta = VALS[card];
            engine.count += delta;
            engine.history.push(engine.count);
            
            updateOracle();
            updateChart();
            addLog(`SIGNAL_IN: ${card} | SHIFT: ${delta}`);
        };

        const updateOracle = () => {
            const text = document.getElementById('prediction-text');
            const glow = document.getElementById('glow');
            const confBar = document.getElementById('conf-fill');
            const confVal = document.getElementById('conf-val');

            let signal = "WAIT";
            let color = "var(--text-dim)";
            let strength = Math.min(Math.abs(engine.count) * 4, 98);

            if (engine.count > 0) {
                signal = "BANKER";
                color = "var(--banker)";
            } else if (engine.count < 0) {
                signal = "PLAYER";
                color = "var(--player)";
            }

            text.innerText = signal;
            text.style.color = color;
            text.style.textShadow = `0 0 30px ${color}`;
            
            glow.style.background = color;
            glow.style.opacity = (strength / 100) + 0.1;
            glow.style.animation = strength > 30 ? `pulse ${2 - (strength/50)}s infinite` : 'none';

            confBar.style.width = strength + "%";
            confBar.style.background = color;
            confVal.innerText = strength + "%";
            confVal.style.color = color;
        };

        const setupChart = () => {
            const ctx = document.getElementById('volatility-chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [0],
                    datasets: [{
                        data: [0],
                        borderColor: '#6d28d9',
                        borderWidth: 1,
                        tension: 0.4,
                        fill: false,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        };

        const updateChart = () => {
            chart.data.labels.push(engine.history.length);
            chart.data.datasets[0].data = engine.history;
            chart.update();
        };

        const addLog = (msg) => {
            const list = document.getElementById('log-list');
            const item = document.createElement('div');
            item.style.marginBottom = "5px";
            item.innerText = `> ${msg}`;
            list.prepend(item);
        };

        const animatePanels = () => {
            setTimeout(() => document.getElementById('panel-1').classList.add('show'), 300);
            setTimeout(() => document.getElementById('panel-2').classList.add('show'), 500);
        };

        // --- SESSION LOGIC ---
        document.getElementById('login-btn').onclick = () => {
            const val = document.getElementById('key-input').value;
            if(val === KEY) {
                localStorage.setItem('oracle_sess', Date.now() + 43200000);
                launch();
            } else {
                document.getElementById('err').style.display = 'block';
            }
        };

        const launch = () => {
            document.getElementById('auth-screen').style.opacity = '0';
            document.getElementById('auth-screen').style.transform = 'scale(1.2)';
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-shell').classList.add('active');
                startTimer();
            }, 800);
        };

        const checkSession = () => {
            const s = localStorage.getItem('oracle_sess');
            if(s && Date.now() < s) launch();
        };

        const startTimer = () => {
            setInterval(() => {
                const s = localStorage.getItem('oracle_sess');
                const diff = s - Date.now();
                if(diff <= 0) location.reload();
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s_ = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s_}`;
            }, 1000);
        };

        document.getElementById('reset-btn').onclick = () => {
            engine.count = 0;
            engine.history = [0];
            updateOracle();
            chart.data.labels = [0];
            chart.data.datasets[0].data = [0];
            chart.update();
            document.getElementById('log-list').innerHTML = '';
            addLog("CORE_PURGE_COMPLETE");
        };

        document.getElementById('exit-btn').onclick = () => {
            localStorage.removeItem('oracle_sess');
            location.reload();
        };

        document.getElementById('mute-btn').onclick = () => {
            const v = document.getElementById('bg-video');
            v.muted = !v.muted;
            document.getElementById('mute-btn').innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        };

        init();
    </script>
</body>
</html>
